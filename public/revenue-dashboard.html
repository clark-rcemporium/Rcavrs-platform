<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AVRS Revenue Dashboard - Cash Flow Generation</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #0f0f1e;
      --secondary: #1a1a2e;
      --tertiary: #16213e;
      --accent: #ffd700;
      --success: #00d084;
      --warning: #ff6b6b;
      --text: #e0e0e0;
      --text-muted: #a0a0a0;
      --border: #2a2a3e;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--primary);
      color: var(--text);
      line-height: 1.6;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }

    /* Header */
    header {
      background: var(--secondary);
      border-bottom: 2px solid var(--accent);
      padding: 20px 0;
      margin-bottom: 30px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    h1 {
      font-size: 28px;
      color: var(--accent);
      font-weight: 700;
    }

    .status-badge {
      display: inline-block;
      padding: 8px 16px;
      background: rgba(0, 208, 132, 0.2);
      color: var(--success);
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }

    /* Main Grid */
    .dashboard {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .card {
      background: var(--secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 25px;
      transition: all 0.3s ease;
    }

    .card:hover {
      border-color: var(--accent);
      box-shadow: 0 10px 30px rgba(255, 215, 0, 0.1);
      transform: translateY(-5px);
    }

    .card-title {
      font-size: 14px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    .card-value {
      font-size: 36px;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 5px;
    }

    .card-subtitle {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* Opportunities Section */
    .opportunities {
      margin-bottom: 40px;
    }

    .section-title {
      font-size: 24px;
      color: var(--accent);
      margin-bottom: 20px;
      font-weight: 700;
    }

    .opportunities-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 20px;
    }

    .opportunity-card {
      background: var(--tertiary);
      border: 2px solid var(--border);
      border-radius: 12px;
      padding: 25px;
      transition: all 0.3s ease;
    }

    .opportunity-card:hover {
      border-color: var(--accent);
      box-shadow: 0 15px 40px rgba(255, 215, 0, 0.15);
    }

    .opp-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      margin-bottom: 15px;
    }

    .opp-name {
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
    }

    .opp-type {
      display: inline-block;
      padding: 4px 12px;
      background: rgba(255, 215, 0, 0.1);
      color: var(--accent);
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .opp-details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-bottom: 15px;
    }

    .detail {
      background: var(--secondary);
      padding: 12px;
      border-radius: 8px;
    }

    .detail-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 5px;
    }

    .detail-value {
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
    }

    .probability-bar {
      width: 100%;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
      margin-top: 10px;
    }

    .probability-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--success));
      transition: width 0.3s ease;
    }

    /* Execution Plan */
    .execution-plan {
      background: var(--secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 30px;
      margin-bottom: 40px;
    }

    .plan-content {
      background: var(--tertiary);
      border-left: 4px solid var(--accent);
      padding: 20px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.8;
      color: var(--text-muted);
      max-height: 400px;
      overflow-y: auto;
    }

    .plan-content h3 {
      color: var(--accent);
      margin-top: 15px;
      margin-bottom: 10px;
      font-size: 14px;
    }

    .plan-content ul {
      margin-left: 20px;
      margin-bottom: 10px;
    }

    .plan-content li {
      margin-bottom: 8px;
    }

    /* Action Buttons */
    .actions {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 14px;
    }

    .btn-primary {
      background: var(--accent);
      color: var(--primary);
    }

    .btn-primary:hover {
      background: #ffed4e;
      transform: translateY(-2px);
    }

    .btn-secondary {
      background: transparent;
      color: var(--accent);
      border: 2px solid var(--accent);
    }

    .btn-secondary:hover {
      background: var(--accent);
      color: var(--primary);
    }

    /* Loading State */
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
    }

    .spinner {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 4px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .dashboard {
        grid-template-columns: 1fr;
      }

      .opportunities-grid {
        grid-template-columns: 1fr;
      }

      .card-value {
        font-size: 28px;
      }

      .actions {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header>
    <div class="container">
      <div class="header-content">
        <div>
          <h1>💰 AVRS Revenue Dashboard</h1>
          <p style="color: var(--text-muted); margin-top: 5px;">Real-time cash flow generation & opportunity tracking</p>
        </div>
        <div class="status-badge">✓ System Active</div>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <div class="container">
    <!-- Key Metrics -->
    <div class="dashboard" id="metrics-container">
      <div class="loading">
        <div class="spinner"></div>
        <p style="margin-top: 15px;">Loading revenue metrics...</p>
      </div>
    </div>

    <!-- Revenue Opportunities -->
    <div class="opportunities">
      <h2 class="section-title">🎯 Revenue Opportunities</h2>
      <div class="opportunities-grid" id="opportunities-container">
        <div class="loading">
          <div class="spinner"></div>
          <p style="margin-top: 15px;">Loading opportunities...</p>
        </div>
      </div>
    </div>

    <!-- Execution Plan -->
    <div class="execution-plan">
      <h2 class="section-title">📋 90-Day Execution Plan</h2>
      <div class="plan-content" id="plan-container">
        <div class="loading">
          <div class="spinner"></div>
          <p style="margin-top: 15px;">Loading execution plan...</p>
        </div>
      </div>
      <div class="actions">
        <button class="btn btn-primary" onclick="downloadPlan()">📥 Download Plan</button>
        <button class="btn btn-secondary" onclick="refreshDashboard()">🔄 Refresh Data</button>
      </div>
    </div>
  </div>

  <script>
    // Load revenue data
    async function loadRevenueData() {
      try {
        // Load metrics
        const metricsRes = await fetch('/api/revenue/metrics');
        const metricsData = await metricsRes.json();
        displayMetrics(metricsData.metrics);

        // Load opportunities
        const oppRes = await fetch('/api/revenue/opportunities');
        const oppData = await oppRes.json();
        displayOpportunities(oppData.opportunities);

        // Load execution plan
        const planRes = await fetch('/api/revenue/execution-plan');
        const planData = await planRes.json();
        displayPlan(planData.plan);
      } catch (error) {
        console.error('Error loading revenue data:', error);
        document.getElementById('metrics-container').innerHTML = '<p style="color: var(--warning);">Error loading data. Please refresh.</p>';
      }
    }

    // Display metrics
    function displayMetrics(metrics) {
      const container = document.getElementById('metrics-container');
      container.innerHTML = `
        <div class="card">
          <div class="card-title">Total MRR</div>
          <div class="card-value">$${(metrics.totalMRR / 1000).toFixed(0)}K</div>
          <div class="card-subtitle">Monthly Recurring Revenue</div>
        </div>
        <div class="card">
          <div class="card-title">Total ARR</div>
          <div class="card-value">$${(metrics.totalARR / 1000000).toFixed(1)}M</div>
          <div class="card-subtitle">Annual Recurring Revenue</div>
        </div>
        <div class="card">
          <div class="card-title">Pipeline Value</div>
          <div class="card-value">$${(metrics.pipelineValue / 1000000).toFixed(1)}M</div>
          <div class="card-subtitle">${metrics.activePipeline} active opportunities</div>
        </div>
        <div class="card">
          <div class="card-title">Runway</div>
          <div class="card-value">${metrics.runway.toFixed(1)}</div>
          <div class="card-subtitle">Months of operational runway</div>
        </div>
        <div class="card">
          <div class="card-title">Time to First Cash</div>
          <div class="card-value">${metrics.timeToFirstCash}</div>
          <div class="card-subtitle">Days to first revenue</div>
        </div>
        <div class="card">
          <div class="card-title">Conversion Rate</div>
          <div class="card-value">${(metrics.conversionRate * 100).toFixed(0)}%</div>
          <div class="card-subtitle">Pipeline to revenue</div>
        </div>
      `;
    }

    // Display opportunities
    function displayOpportunities(opportunities) {
      const container = document.getElementById('opportunities-container');
      const html = opportunities.map(opp => `
        <div class="opportunity-card">
          <div class="opp-header">
            <div class="opp-name">${opp.name}</div>
            <div class="opp-type">${opp.type}</div>
          </div>
          <div class="opp-details">
            <div class="detail">
              <div class="detail-label">Est. MRR</div>
              <div class="detail-value">$${(opp.estimatedMRR / 1000).toFixed(0)}K</div>
            </div>
            <div class="detail">
              <div class="detail-label">Probability</div>
              <div class="detail-value">${(opp.probability * 100).toFixed(0)}%</div>
            </div>
            <div class="detail">
              <div class="detail-label">Time to Cash</div>
              <div class="detail-value">${opp.timeToFirstCash} days</div>
            </div>
            <div class="detail">
              <div class="detail-label">Status</div>
              <div class="detail-value" style="text-transform: capitalize;">${opp.status}</div>
            </div>
          </div>
          <div class="probability-bar">
            <div class="probability-fill" style="width: ${opp.probability * 100}%"></div>
          </div>
        </div>
      `).join('');
      container.innerHTML = html;
    }

    // Display execution plan
    function displayPlan(plan) {
      const container = document.getElementById('plan-container');
      container.innerHTML = `<pre style="white-space: pre-wrap; word-wrap: break-word; font-size: 12px;">${plan}</pre>`;
    }

    // Download plan
    function downloadPlan() {
      fetch('/api/revenue/execution-plan')
        .then(res => res.json())
        .then(data => {
          const element = document.createElement('a');
          element.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent(data.plan));
          element.setAttribute('download', 'AVRS-Revenue-Plan.txt');
          element.style.display = 'none';
          document.body.appendChild(element);
          element.click();
          document.body.removeChild(element);
        });
    }

    // Refresh dashboard
    function refreshDashboard() {
      loadRevenueData();
    }

    // Load on page load
    window.addEventListener('load', loadRevenueData);

    // Auto-refresh every 5 minutes
    setInterval(loadRevenueData, 5 * 60 * 1000);
  </script>
</body>
</html>
